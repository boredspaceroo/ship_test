<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Star Fox Inspired Ship Prototype</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f1a;
      touch-action: none;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f1a);

    const camera = new THREE.PerspectiveCamera(
      42,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.4, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const hemi = new THREE.HemisphereLight(0xbfd7ff, 0x1b1f2a, 1.6);
    scene.add(hemi);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(4, 6, 6);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x88aaff, 1.2);
    rimLight.position.set(-6, 3, -5);
    scene.add(rimLight);

    const fillLight = new THREE.DirectionalLight(0x99bbff, 0.8);
    fillLight.position.set(0, -2, 4);
    scene.add(fillLight);

    // Materials
    const whiteMat = new THREE.MeshStandardMaterial({
      color: 0xe9edf5,
      metalness: 0.45,
      roughness: 0.38
    });

    const blueMat = new THREE.MeshStandardMaterial({
      color: 0x365fd8,
      metalness: 0.55,
      roughness: 0.3
    });

    const darkMat = new THREE.MeshStandardMaterial({
      color: 0x1f2738,
      metalness: 0.5,
      roughness: 0.45
    });

    const visorMat = new THREE.MeshStandardMaterial({
      color: 0x101926,
      metalness: 0.9,
      roughness: 0.12
    });

    const yellowMat = new THREE.MeshStandardMaterial({
      color: 0xe9c94b,
      metalness: 0.55,
      roughness: 0.35,
      emissive: 0x3a2b00,
      emissiveIntensity: 0.18
    });

    function createCustomHullGeometry() {
      const positions = new Float32Array([
        // top nose
         0.00,  0.18,  3.20,
        -0.28,  0.10,  2.30,
         0.28,  0.10,  2.30,

         0.00,  0.18,  3.20,
         0.28,  0.10,  2.30,
         0.00, -0.06,  2.70,

         0.00,  0.18,  3.20,
         0.00, -0.06,  2.70,
        -0.28,  0.10,  2.30,

        // forward upper hull
        -0.28,  0.10,  2.30,
        -0.72,  0.25,  0.85,
         0.72,  0.25,  0.85,

        -0.28,  0.10,  2.30,
         0.72,  0.25,  0.85,
         0.28,  0.10,  2.30,

        // forward lower hull
         0.00, -0.06,  2.70,
         0.58, -0.28,  0.95,
        -0.58, -0.28,  0.95,

        // side nose panels
        -0.28,  0.10,  2.30,
        -0.58, -0.28,  0.95,
        -0.72,  0.25,  0.85,

         0.28,  0.10,  2.30,
         0.72,  0.25,  0.85,
         0.58, -0.28,  0.95,

        // mid body top
        -0.72,  0.25,  0.85,
        -1.05,  0.48, -0.70,
         1.05,  0.48, -0.70,

        -0.72,  0.25,  0.85,
         1.05,  0.48, -0.70,
         0.72,  0.25,  0.85,

        // mid body bottom
        -0.58, -0.28,  0.95,
         0.82, -0.34, -0.65,
        -0.82, -0.34, -0.65,

        -0.58, -0.28,  0.95,
         0.58, -0.28,  0.95,
         0.82, -0.34, -0.65,

        // rear taper top
        -1.05,  0.48, -0.70,
        -0.52,  0.20, -2.50,
         0.52,  0.20, -2.50,

        -1.05,  0.48, -0.70,
         0.52,  0.20, -2.50,
         1.05,  0.48, -0.70,

        // rear taper bottom
        -0.82, -0.34, -0.65,
         0.42, -0.20, -2.40,
        -0.42, -0.20, -2.40,

        -0.82, -0.34, -0.65,
         0.82, -0.34, -0.65,
         0.42, -0.20, -2.40,

        // left side body
        -0.72,  0.25,  0.85,
        -0.58, -0.28,  0.95,
        -1.05,  0.48, -0.70,

        -0.58, -0.28,  0.95,
        -0.82, -0.34, -0.65,
        -1.05,  0.48, -0.70,

        -1.05,  0.48, -0.70,
        -0.82, -0.34, -0.65,
        -0.52,  0.20, -2.50,

        -0.82, -0.34, -0.65,
        -0.42, -0.20, -2.40,
        -0.52,  0.20, -2.50,

        // right side body
         0.72,  0.25,  0.85,
         1.05,  0.48, -0.70,
         0.58, -0.28,  0.95,

         0.58, -0.28,  0.95,
         1.05,  0.48, -0.70,
         0.82, -0.34, -0.65,

         1.05,  0.48, -0.70,
         0.52,  0.20, -2.50,
         0.82, -0.34, -0.65,

         0.82, -0.34, -0.65,
         0.52,  0.20, -2.50,
         0.42, -0.20, -2.40
      ]);

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.computeVertexNormals();
      return geometry;
    }

    function makeFinShape(points) {
      const shape = new THREE.Shape();
      shape.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) {
        shape.lineTo(points[i][0], points[i][1]);
      }
      shape.closePath();

      return new THREE.ExtrudeGeometry(shape, {
        depth: 0.12,
        bevelEnabled: false
      });
    }

    const ship = new THREE.Group();
    scene.add(ship);

    // Main hull
    const hull = new THREE.Mesh(createCustomHullGeometry(), whiteMat);
    ship.add(hull);

    // Cockpit / visor
    const canopyGeo = new THREE.BufferGeometry();
    canopyGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array([
       0.00, 0.58,  0.90,
      -0.35, 0.38,  0.55,
       0.35, 0.38,  0.55,

       0.00, 0.58,  0.90,
       0.35, 0.38,  0.55,
       0.00, 0.26, -0.05,

       0.00, 0.58,  0.90,
       0.00, 0.26, -0.05,
      -0.35, 0.38,  0.55,

      -0.35, 0.38,  0.55,
       0.00, 0.26, -0.05,
       0.35, 0.38,  0.55
    ]), 3));
    canopyGeo.computeVertexNormals();
    const canopy = new THREE.Mesh(canopyGeo, visorMat);
    ship.add(canopy);

    // Side intake armor
    const intakeGeo = new THREE.BoxGeometry(0.4, 0.22, 0.7);
    const intakeL = new THREE.Mesh(intakeGeo, darkMat);
    intakeL.position.set(-0.92, 0.02, 0.20);
    intakeL.rotation.z = -0.18;
    intakeL.rotation.x = 0.05;
    ship.add(intakeL);

    const intakeR = intakeL.clone();
    intakeR.position.x *= -1;
    intakeR.rotation.z *= -1;
    ship.add(intakeR);

    // Side white shoulder armor
    const shoulderGeo = new THREE.BoxGeometry(0.34, 0.18, 1.05);
    const shoulderL = new THREE.Mesh(shoulderGeo, whiteMat);
    shoulderL.position.set(-1.15, 0.10, -0.10);
    shoulderL.rotation.z = -0.45;
    shoulderL.rotation.x = 0.2;
    ship.add(shoulderL);

    const shoulderR = shoulderL.clone();
    shoulderR.position.x *= -1;
    shoulderR.rotation.z *= -1;
    ship.add(shoulderR);

    // Blue dorsal fins / side blades
    const topBladeGeo = makeFinShape([
      [0.0, 0.0],
      [0.9, 0.15],
      [1.9, 2.2],
      [1.0, 2.0],
      [0.2, 0.5]
    ]);

    const leftTopBlade = new THREE.Mesh(topBladeGeo, blueMat);
    leftTopBlade.rotation.x = Math.PI / 2;
    leftTopBlade.rotation.z = -0.16;
    leftTopBlade.position.set(-1.05, 0.55, -0.95);
    ship.add(leftTopBlade);

    const rightTopBlade = leftTopBlade.clone();
    rightTopBlade.scale.x = -1;
    rightTopBlade.position.x = 1.05;
    rightTopBlade.rotation.z = 0.16;
    ship.add(rightTopBlade);

    // Main swept wings
    const wingGeo = makeFinShape([
      [0.0, 0.0],
      [2.45, -0.18],
      [3.45, 0.12],
      [1.6, 0.72],
      [0.15, 0.35]
    ]);

    const leftWing = new THREE.Mesh(wingGeo, whiteMat);
    leftWing.rotation.y = Math.PI / 2;
    leftWing.rotation.x = Math.PI;
    leftWing.position.set(-1.1, -0.02, -0.8);
    leftWing.scale.set(1, 1, 1);
    ship.add(leftWing);

    const rightWing = leftWing.clone();
    rightWing.scale.z = -1;
    rightWing.position.x = 1.1;
    ship.add(rightWing);

    // Blue wing roots / armor blocks
    const rootGeo = new THREE.BoxGeometry(0.5, 0.18, 1.15);
    const rootL = new THREE.Mesh(rootGeo, blueMat);
    rootL.position.set(-1.0, -0.04, -0.85);
    rootL.rotation.z = -0.12;
    ship.add(rootL);

    const rootR = rootL.clone();
    rootR.position.x *= -1;
    rootR.rotation.z *= -1;
    ship.add(rootR);

    // Lower ventral fins
    const ventralGeo = makeFinShape([
      [0.0, 0.0],
      [1.0, -0.1],
      [1.7, 1.4],
      [0.8, 1.0],
      [0.15, 0.25]
    ]);

    const leftVentral = new THREE.Mesh(ventralGeo, whiteMat);
    leftVentral.rotation.x = Math.PI / 2;
    leftVentral.rotation.z = -0.45;
    leftVentral.position.set(-0.78, -0.45, -0.72);
    ship.add(leftVentral);

    const rightVentral = leftVentral.clone();
    rightVentral.scale.x = -1;
    rightVentral.position.x = 0.78;
    rightVentral.rotation.z = 0.45;
    ship.add(rightVentral);

    // Central rear spine / engine housing
    const spineGeo = new THREE.BoxGeometry(0.38, 0.22, 2.15);
    const spine = new THREE.Mesh(spineGeo, darkMat);
    spine.position.set(0, 0.18, -1.15);
    spine.rotation.x = -0.08;
    ship.add(spine);

    // Tail stinger
    const tailGeo = new THREE.ConeGeometry(0.09, 1.3, 5);
    const tail = new THREE.Mesh(tailGeo, whiteMat);
    tail.rotation.x = Math.PI / 2;
    tail.position.set(0, -0.02, -3.05);
    ship.add(tail);

    // Top fin
    const topFinGeo = makeFinShape([
      [0.0, 0.0],
      [0.35, 0.05],
      [0.15, 1.05],
      [-0.1, 0.95]
    ]);
    const topFin = new THREE.Mesh(topFinGeo, blueMat);
    topFin.rotation.x = Math.PI / 2;
    topFin.position.set(0, 0.48, -2.05);
    ship.add(topFin);

    // Small yellow accents
    const accentGeo = new THREE.BoxGeometry(0.12, 0.03, 0.22);

    const a1 = new THREE.Mesh(accentGeo, yellowMat);
    a1.position.set(-1.78, 0.04, 0.28);
    a1.rotation.y = 0.25;
    ship.add(a1);

    const a2 = a1.clone();
    a2.position.x = 1.78;
    a2.rotation.y = -0.25;
    ship.add(a2);

    const a3 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.03, 0.16), yellowMat);
    a3.position.set(0, 0.18, 1.75);
    ship.add(a3);

    // Tiny engine glow hints
    const glowMat = new THREE.MeshStandardMaterial({
      color: 0x7fb7ff,
      emissive: 0x3d8cff,
      emissiveIntensity: 1.5,
      metalness: 0.1,
      roughness: 0.25
    });

    const glowGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.18, 16);
    const glowL = new THREE.Mesh(glowGeo, glowMat);
    glowL.rotation.z = Math.PI / 2;
    glowL.position.set(-0.32, 0.02, -2.42);
    ship.add(glowL);

    const glowR = glowL.clone();
    glowR.position.x = 0.32;
    ship.add(glowR);

    // Slight presentation angle
    ship.rotation.x = -0.12;
    ship.rotation.y = 0.55;

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.9;
    controls.minPolarAngle = Math.PI * 0.18;
    controls.maxPolarAngle = Math.PI * 0.82;
    controls.target.set(0, 0.1, 0);

    // Soft idle spin until user interacts
    let autoRotate = true;

    renderer.domElement.addEventListener("pointerdown", () => {
      autoRotate = false;
    }, { passive: true });

    window.addEventListener("resize", onResize);

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate) {
        ship.rotation.y += 0.0035;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
